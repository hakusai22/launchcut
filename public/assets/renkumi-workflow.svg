    <rect x="382" y="488" width="82" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="382" y="526" width="74" height="26" rx="13" fill="#fff" stroke="#e2e8f0"/>

    <rect x="560" y="350" width="178" height="220" rx="24" fill="#f8fafc"/>
    <text x="592" y="402" fill="#0f1728" font-size="22" font-weight="850">AI scenes</text>
    <rect x="592" y="432" width="58" height="46" rx="13" fill="#21c7a8"/>
    <rect x="664" y="432" width="42" height="46" rx="13" fill="#8fd8ea"/>
    <rect x="592" y="500" width="98" height="11" rx="5.5" fill="#0f1728"/>
    <rect x="592" y="527" width="76" height="10" rx="5" fill="#94a3b8"/>

    <rect x="770" y="350" width="178" height="220" rx="24" fill="#f8fafc"/>
    <text x="802" y="402" fill="#0f1728" font-size="22" font-weight="850">Render</text>
    <rect x="802" y="430" width="114" height="70" rx="15" fill="#0f1728"/>
    <path d="M849 452v26l24-13z" fill="#fff"/>
    <rect x="802" y="526" width="86" height="12" rx="6" fill="#f7b84b"/>

    <rect x="980" y="350" width="100" height="220" rx="24" fill="#f8fafc"/>
    <text x="1014" y="402" fill="#0f1728" font-size="22" font-weight="850">Ship</text>
    <rect x="1014" y="430" width="34" height="92" rx="11" fill="#f07955"/>
    <rect x="1022" y="444" width="18" height="10" rx="5" fill="#fff" opacity=".74"/>
    <rect x="1014" y="542" width="34" height="10" rx="5" fill="#94a3b8"/>
  </g>

  <rect x="350" y="620" width="730" height="42" rx="21" fill="#f1f5f9"/>
  <rect x="374" y="635" width="92" height="12" rx="6" fill="#7d5cf7"/>
  <rect x="496" y="635" width="146" height="12" rx="6" fill="#21c7a8"/>
