<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Renkumi workflow pipeline">
  <defs>
    <linearGradient id="workflow-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf4"/>
      <stop offset=".55" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#f2fff9"/>
    </linearGradient>
    <linearGradient id="workflow-dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#07090f"/>
    </linearGradient>
    <linearGradient id="workflow-accent" x1="0" x2="1">
      <stop offset="0" stop-color="#7d5cf7"/>
      <stop offset=".54" stop-color="#21c7a8"/>
      <stop offset="1" stop-color="#f7b84b"/>
    </linearGradient>
    <filter id="workflow-shadow" x="-14%" y="-18%" width="128%" height="136%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#152033" flood-opacity=".14"/>
    </filter>
    <filter id="workflow-float" x="-16%" y="-24%" width="132%" height="148%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#152033" flood-opacity=".12"/>
    </filter>
    <pattern id="workflow-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#cbd5e1" stroke-width="1" opacity=".42"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#workflow-bg)"/>
  <rect width="1200" height="800" fill="url(#workflow-grid)" opacity=".48"/>
  <circle cx="1052" cy="146" r="124" fill="#7d5cf7" opacity=".12"/>
  <circle cx="164" cy="658" r="160" fill="#21c7a8" opacity=".12"/>

  <rect x="72" y="74" width="1056" height="652" rx="34" fill="#fff" filter="url(#workflow-shadow)"/>
  <rect x="72" y="74" width="230" height="652" rx="34" fill="url(#workflow-dark)"/>
  <path d="M302 74v652H268V74z" fill="url(#workflow-dark)"/>
  <text x="122" y="150" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="850">Renkumi</text>
  <text x="122" y="184" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">VIDEO OPS</text>
  <rect x="122" y="232" width="128" height="34" rx="17" fill="#fff" opacity=".11"/>
  <rect x="122" y="290" width="102" height="12" rx="6" fill="#7d5cf7"/>
  <rect x="122" y="336" width="132" height="12" rx="6" fill="#fff" opacity=".42"/>
  <rect x="122" y="382" width="112" height="12" rx="6" fill="#fff" opacity=".28"/>
  <rect x="122" y="594" width="122" height="44" rx="15" fill="#21c7a8"/>
  <path d="M158 616h28M172 602v28" stroke="#fff" stroke-width="6" stroke-linecap="round"/>

  <text x="354" y="146" fill="#0f1728" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="850">From brief to reusable video</text>
  <rect x="354" y="170" width="392" height="13" rx="6.5" fill="#cbd5e1"/>

  <path d="M418 278H934" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
  <path d="M418 278H748" stroke="url(#workflow-accent)" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Inter, Arial, sans-serif">
    <circle cx="418" cy="278" r="34" fill="#7d5cf7" filter="url(#workflow-float)"/>
    <text x="418" y="287" text-anchor="middle" fill="#fff" font-size="24" font-weight="850">1</text>
    <circle cx="590" cy="278" r="34" fill="#21c7a8" filter="url(#workflow-float)"/>
    <text x="590" y="287" text-anchor="middle" fill="#fff" font-size="24" font-weight="850">2</text>
    <circle cx="762" cy="278" r="34" fill="#f7b84b" filter="url(#workflow-float)"/>
    <text x="762" y="287" text-anchor="middle" fill="#0f1728" font-size="24" font-weight="850">3</text>
    <circle cx="934" cy="278" r="34" fill="#f07955" filter="url(#workflow-float)"/>
    <text x="934" y="287" text-anchor="middle" fill="#fff" font-size="24" font-weight="850">4</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
